services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agrisolar
    ports:
      - "5432:5432"
    volumes:
      - agrisolar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agrisolar"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      PORT: "3001"
      # In dev we allow all origins by default (see server/src/app.js)
      DATABASE_URL: postgresql://postgres:postgres@db:5432/agrisolar?schema=public
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
    command: sh -c "npm run prisma:generate && npm run db:push && npm run db:seed && npm run dev"
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      # IMPORTANT: this value is used in browser; must be reachable from host
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - server

volumes:
  agrisolar_pgdata:
